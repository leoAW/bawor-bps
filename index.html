<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BAWOR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&family=Fraunces:ital,wght@0,300;0,600;0,700;1,300;1,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/bawor-theme.css" />
    <script>
      if (localStorage.getItem('bawor_theme') === 'light') {
        document.documentElement.classList.add('light-mode')
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
          theme: {
            extend: {
              fontFamily: {
                display: ['Fraunces', 'serif'],
                body: ['Plus Jakarta Sans', 'sans-serif'],
              },
              colors: {
                bawor: {
                  navy: '#0B1F3A',
                  teal: '#0E7C7B',
                  teallt: '#1AAFA8',
                  gold: '#E8A923',
                  cream: '#F5F0E8',
                  mist: '#E8F0EF',
                  ink: '#112240',
                },
              },
              animation: {
                'fade-up': 'fadeUp 0.7s ease both',
                'fade-in': 'fadeIn 0.6s ease both',
                float: 'float 6s ease-in-out infinite',
                'pulse-slow': 'pulse 4s ease-in-out infinite',
              },
              keyframes: {
                fadeUp: {
                  '0%': { opacity: '0', transform: 'translateY(28px)' },
                  '100%': { opacity: '1', transform: 'translateY(0)' },
                },
                fadeIn: {
                  '0%': { opacity: '0' },
                  '100%': { opacity: '1' },
                },
                float: {
                  '0%,100%': { transform: 'translateY(0px)' },
                  '50%': { transform: 'translateY(-14px)' },
                },
              },
            },
          },
      }
    </script>
    <style>#root { display: contents; }</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
